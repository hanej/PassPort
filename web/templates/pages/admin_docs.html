{{define "title"}}Documentation - Admin - {{(branding).AppTitle}}{{end}}

{{define "admin_content"}}
<style>
.docs-content h1 { font-size: 1.8rem; margin-top: 2rem; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid #e2e8f0; }
.docs-content h2 { font-size: 1.5rem; margin-top: 2rem; margin-bottom: 0.75rem; padding-bottom: 0.3rem; border-bottom: 1px solid #e2e8f0; position: relative; }
.docs-content h3 { font-size: 1.25rem; margin-top: 1.5rem; margin-bottom: 0.5rem; }
.docs-content h4 { font-size: 1.1rem; margin-top: 1rem; margin-bottom: 0.5rem; }
.docs-content pre { background-color: #f7fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 1rem; overflow-x: auto; font-size: 0.85rem; }
.docs-content code { background-color: #f0f0f0; padding: 0.15rem 0.35rem; border-radius: 3px; font-size: 0.9em; }
.docs-content pre code { background: none; padding: 0; font-size: inherit; }
.docs-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
.docs-content th, .docs-content td { border: 1px solid #e2e8f0; padding: 0.5rem 0.75rem; text-align: left; }
.docs-content th { background-color: #f7fafc; font-weight: 600; }
.docs-content blockquote { border-left: 4px solid #d69e2e; padding: 0.75rem 1rem; margin: 1rem 0; background-color: #fffff0; color: #744210; border-radius: 0 4px 4px 0; }
.docs-content hr { border: none; border-top: 1px solid #e2e8f0; margin: 2rem 0; }
.docs-content ul, .docs-content ol { padding-left: 1.5rem; }
.docs-content li { margin-bottom: 0.25rem; }
.docs-content a { color: #2c5282; }
.docs-content img { max-width: 100%; }
.docs-toc-link { font-size: 0.75rem; text-decoration: none; opacity: 0.5; margin-left: 0.5rem; }
.docs-toc-link:hover { opacity: 1; }

/* Floating back-to-top button */
#docs-back-to-top {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 1000;
    display: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
</style>

<div id="docs-top" class="d-flex justify-content-between align-items-center mb-3">
    <h3><i class="bi bi-book me-2"></i>Documentation</h3>
</div>

<div class="card">
    <div class="card-body docs-content" id="docs-content">
        {{.Data.Content}}
    </div>
</div>

<!-- Floating back-to-top button -->
<button type="button" class="btn btn-primary btn-sm rounded-circle" id="docs-back-to-top"
        style="width: 40px; height: 40px;" title="Back to Table of Contents">
    <i class="bi bi-arrow-up"></i>
</button>

<script>
(function() {
    // Add "↑ Table of Contents" link after each h2 heading.
    var headings = document.querySelectorAll('#docs-content h2');
    headings.forEach(function(h2) {
        // Skip the "Table of Contents" heading itself.
        if (h2.id === 'table-of-contents') return;

        var link = document.createElement('a');
        link.href = '#table-of-contents';
        link.className = 'docs-toc-link';
        link.innerHTML = '<i class="bi bi-arrow-up"></i> Table of Contents';
        link.addEventListener('click', function(e) {
            e.preventDefault();
            var toc = document.getElementById('table-of-contents');
            if (toc) toc.scrollIntoView({ behavior: 'smooth' });
        });
        h2.appendChild(link);
    });

    // Floating back-to-top button — show when scrolled past 400px.
    var btn = document.getElementById('docs-back-to-top');
    window.addEventListener('scroll', function() {
        if (window.scrollY > 400) {
            btn.style.display = 'block';
        } else {
            btn.style.display = 'none';
        }
    });

    btn.addEventListener('click', function() {
        var toc = document.getElementById('table-of-contents');
        if (toc) {
            toc.scrollIntoView({ behavior: 'smooth' });
        } else {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    });

    // Make all anchor links scroll smoothly.
    document.querySelectorAll('#docs-content a[href^="#"]').forEach(function(a) {
        a.addEventListener('click', function(e) {
            var targetId = this.getAttribute('href').substring(1);
            var target = document.getElementById(targetId);
            if (target) {
                e.preventDefault();
                target.scrollIntoView({ behavior: 'smooth' });
            }
        });
    });
})();
</script>
{{end}}
