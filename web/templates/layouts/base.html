{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}{{(branding).AppTitle}}{{end}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">
    {{if (branding).PrimaryColor}}<style>
    :root {
        --pp-primary: {{(branding).PrimaryColor}};
        --pp-primary-light: {{if (branding).PrimaryLightColor}}{{(branding).PrimaryLightColor}}{{else}}{{darkenHex (branding).PrimaryColor -0.2}}{{end}};
    }
    /* Bootstrap .btn-primary hardcodes --bs-btn-bg at .btn-primary level; we must override
       at the same specificity. Our <style> is after the Bootstrap CDN link, so we win. */
    .btn-primary {
        --bs-btn-bg: {{(branding).PrimaryColor}};
        --bs-btn-border-color: {{(branding).PrimaryColor}};
        --bs-btn-hover-bg: {{darkenHex (branding).PrimaryColor 0.12}};
        --bs-btn-hover-border-color: {{darkenHex (branding).PrimaryColor 0.15}};
        --bs-btn-active-bg: {{darkenHex (branding).PrimaryColor 0.18}};
        --bs-btn-active-border-color: {{darkenHex (branding).PrimaryColor 0.2}};
        --bs-btn-disabled-bg: {{(branding).PrimaryColor}};
        --bs-btn-disabled-border-color: {{(branding).PrimaryColor}};
        --bs-btn-focus-shadow-rgb: {{hexToRGB (branding).PrimaryColor}};
    }
    .btn-outline-primary {
        --bs-btn-color: {{(branding).PrimaryColor}};
        --bs-btn-border-color: {{(branding).PrimaryColor}};
        --bs-btn-hover-bg: {{(branding).PrimaryColor}};
        --bs-btn-hover-border-color: {{(branding).PrimaryColor}};
        --bs-btn-active-bg: {{(branding).PrimaryColor}};
        --bs-btn-active-border-color: {{(branding).PrimaryColor}};
        --bs-btn-focus-shadow-rgb: {{hexToRGB (branding).PrimaryColor}};
    }
    .text-primary { color: {{(branding).PrimaryColor}} !important; }
    .badge.bg-primary { background-color: {{(branding).PrimaryColor}} !important; }
    </style>{{end}}
</head>
<body>
    {{template "nav" .}}

    <main class="container-fluid py-4">
        {{template "flash" .}}
        {{block "content" .}}{{end}}
    </main>

    <footer class="footer mt-auto py-3 bg-light border-top">
        <div class="container text-center">
            <a href="https://github.com/hanej/PassPort" target="_blank" rel="noopener noreferrer" class="text-muted text-decoration-none"><i class="bi bi-github me-2"></i>&copy; 2026 PassPort</a>{{if (branding).FooterText}} &mdash; {{(branding).FooterText}}{{end}}
        </div>
    </footer>
    {{block "page_footer" .}}{{end}}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>{{end}}
