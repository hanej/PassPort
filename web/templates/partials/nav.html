{{define "nav"}}
<nav class="navbar navbar-expand-lg navbar-dark bg-primary"{{if (branding).PrimaryColor}} style="background-color: {{(branding).PrimaryColor}} !important;"{{end}}>
    <div class="container-fluid">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="/dashboard">
            {{if (branding).LogoURL}}<img src="{{(branding).LogoURL}}" alt="" height="28" class="me-2" style="vertical-align: middle;">{{else}}<i class="bi bi-shield-lock me-2"></i>{{end}}<span>{{(branding).AppAbbreviation}}</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain"
                aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav ms-auto">
                {{if .Session}}
                    {{if .Session.IsAdmin}}
                    <li class="nav-item">
                        <a class="nav-link" href="/admin">
                            <i class="bi bi-gear me-1"></i>Administration
                        </a>
                    </li>
                    {{end}}
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="/dashboard" role="button"
                           data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-person-circle me-1"></i>{{.Session.Username}}
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <a class="dropdown-item" href="/logout">
                                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                                </a>
                            </li>
                        </ul>
                    </li>
                {{end}}
            </ul>
        </div>
    </div>
</nav>
{{end}}
