name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: macos-amd64
          - goos: darwin
            goarch: arm64
            suffix: macos-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            extension: .exe

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o bin/passport-${{ matrix.suffix }}${{ matrix.extension }} \
            ./cmd/passport

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: passport-${{ matrix.suffix }}${{ matrix.extension }}
          path: bin/passport-${{ matrix.suffix }}${{ matrix.extension }}

  rpm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            nfpm_arch: amd64
          - goarch: arm64
            nfpm_arch: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o bin/passport \
            ./cmd/passport

      - name: Build RPM
        env:
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          VERSION=${GITHUB_REF_NAME#v} \
          nfpm pkg \
            --packager rpm \
            --config nfpm.yaml \
            --target dist/
          # Embed the arch in the filename for clarity
          for f in dist/*.rpm; do
            mv "$f" "${f%.rpm}-${{ matrix.nfpm_arch }}.rpm"
          done

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v7
        with:
          name: rpm-${{ matrix.nfpm_arch }}
          path: dist/*.rpm

  release:
    runs-on: ubuntu-latest
    needs: [build, rpm]
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
