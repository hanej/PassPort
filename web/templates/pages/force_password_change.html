{{define "title"}}Change Password - {{(branding).AppTitle}}{{end}}

{{define "content"}}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm mt-5">
                <div class="card-header bg-warning bg-opacity-10 text-center">
                    <h4 class="mb-0">
                        <i class="bi bi-exclamation-triangle text-warning me-2"></i>Password Change Required
                    </h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted text-center mb-4">
                        You must change your password before continuing. This is required on first login.
                    </p>

                    <form method="POST" action="/change-password" class="password-change-form">
                        {{.CSRFField}}

                        <div class="mb-3">
                            <label for="new_password" class="form-label">New Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control password-field new-password"
                                       id="new_password" name="new_password" required
                                       data-confirm="confirm_password"
                                       placeholder="Enter new password">
                                <button class="btn btn-outline-secondary toggle-password" type="button"
                                        data-target="new_password">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="confirm_password" class="form-label">Confirm New Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                <input type="password" class="form-control password-field confirm-password"
                                       id="confirm_password" name="confirm_password" required
                                       data-new="new_password"
                                       placeholder="Confirm new password">
                                <button class="btn btn-outline-secondary toggle-password" type="button"
                                        data-target="confirm_password">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                            <div class="password-match-indicator mt-2" id="match-force"></div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 pw-submit-btn" disabled>
                            <i class="bi bi-check-lg me-2"></i>Change Password
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{{end}}
